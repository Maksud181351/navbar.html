<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meet the Speakers</title>
<link rel="stylesheet" href="./card.css">
</head>
<body>

  <h2 class="section-title">Meet the Speakers</h2>

  <div class="speakers-grid">

    <div class="speaker-card">
      <img class="speaker-photo" src="./image/andrej.png" alt="Speaker photo">
      <div class="speaker-info">
        <div class="speaker-tag">AI / ML</div>
        <div class="speaker-name">Andrej Karpathy</div>
        <div class="speaker-role">Pretraining team, Anthropic</div>
      </div>
    </div>

    <div class="speaker-card">
      <img class="speaker-photo" src="./image/demis.png" alt="Speaker photo">
      <div class="speaker-info">
        <div class="speaker-tag">Cloud &amp; DevOps</div>
        <div class="speaker-name">Demis Hassabis</div>
        <div class="speaker-role">Co-Founder and CEO, Google DeepMind</div>
      </div>
    </div>

    <div class="speaker-card">
      <img class="speaker-photo" src="./image/gary.png" alt="Speaker photo">
      <div class="speaker-info">
        <div class="speaker-tag">Frontend</div>
        <div class="speaker-name">Gary Marcus</div>
        <div class="speaker-role">Staff Engineer, Vercel</div>
      </div>
    </div>

    <div class="speaker-card">
      <img class="speaker-photo" src="./image/mustafa.png" alt="Speaker photo">
      <div class="speaker-info">
        <div class="speaker-tag">Security</div>
        <div class="speaker-name">Mustafa Suleyman</div>
        <div class="speaker-role">CEO of Microsoft Al</div>
      </div>
    </div>

  </div>

</body>
</html>
